<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-REX VS RAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .game-card {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 20px 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 2px solid #000000;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
        }

        .score {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
            border: 1px solid #d0d0d0;
            background-color: #fafafa;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background-color: #fafafa;
            cursor: crosshair;
            touch-action: none;
        }

        /* 开始按钮覆盖层 */
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            border: 1px solid #000;
        }

        .start-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .start-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .start-btn {
            background: none;
            border: 2px solid #000;
            font-size: 24px;
            font-weight: 600;
            padding: 16px 48px;
            color: #000;
            cursor: pointer;
            background-color: #ffffff;
        }

        .start-btn:active {
            background-color: #000;
            color: #fff;
        }

        .start-hint {
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        /* 游戏结束弹窗 */
        .gameover-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 32px 24px;
            text-align: center;
            z-index: 20;
            min-width: 240px;
            width: 80%;
            max-width: 300px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 700;
            color: #000;
            margin-bottom: 16px;
        }

        .modal-score {
            font-size: 56px;
            font-weight: 700;
            color: #000;
            margin: 16px 0;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 16px 0;
        }

        .modal-btn {
            background: none;
            border: 2px solid #000;
            font-size: 24px;
            font-weight: 600;
            padding: 14px 28px;
            color: #000;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }

        .modal-btn:active {
            background-color: #000;
            color: #fff;
        }

        /* 控制栏 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .pause-btn {
            background: none;
            border: 1px solid #222;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 24px;
            color: #000;
            cursor: pointer;
            background-color: #ffffff;
        }

        .pause-btn:active {
            background-color: #f0f0f0;
        }

        .pause-btn.paused {
            background-color: #000;
            color: #fff;
        }

        .status {
            font-size: 16px;
            color: #666;
        }

        .reset-btn {
            background: none;
            border: 1px solid #aaa;
            font-size: 16px;
            padding: 6px 16px;
            cursor: pointer;
        }

        /* 排行榜 */
        .leaderboard {
            margin-top: 20px;
            border: 1px solid #000;
            padding: 12px;
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .leaderboard-title {
            font-size: 18px;
            font-weight: 600;
        }

        .clear-btn {
            background: none;
            border: 1px solid #999;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
        }

        .leaderboard-list {
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px;
            border-bottom: 1px dotted #eee;
        }

        .rank-number {
            font-weight: 600;
            width: 30px;
        }

        .rank-score {
            font-weight: 600;
            width: 50px;
            text-align: right;
        }

        .rank-date {
            color: #999;
            font-size: 12px;
            flex: 1;
            text-align: right;
        }

        .empty-message {
            color: #aaa;
            text-align: center;
            padding: 20px 0;
        }

        /* 页脚 */
        .footer {
            margin-top: 24px;
            text-align: center;
            color: #aaa;
            font-size: 20px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-card">
    <!-- 头部 -->
    <div class="header">
        <div class="title">T-REX VS RAT</div>
        <div class="score" id="scoreDisplay">0</div>
    </div>

    <!-- 游戏画布区域 -->
    <div class="canvas-container" style="position: relative;">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <!-- 开始覆盖层 -->
        <div id="startOverlay" class="start-overlay">
            <div class="start-emoji">🦖 🐀</div>
            <div class="start-title">T-REX VS RAT</div>
            <button class="start-btn" id="startBtn">START</button>
            <div class="start-hint">mouse / touch · space to pause</div>
        </div>
        
        <!-- 游戏结束弹窗 -->
        <div id="gameoverModal" class="gameover-modal hidden">
            <div class="modal-title">GAME OVER</div>
            <div class="modal-score" id="finalScoreDisplay">0</div>
            <button class="modal-btn" id="retryBtn">AGAIN</button>
        </div>
    </div>

    <!-- 控制栏 -->
    <div class="controls">
        <button class="pause-btn" id="pauseBtn" disabled>PAUSE</button>
        <span class="status" id="statusText">⏹️</span>
        <button class="reset-btn" id="resetBtn" disabled>↺</button>
    </div>

    <!-- 排行榜 -->
    <div class="leaderboard">
        <div class="leaderboard-header">
            <div class="leaderboard-title">🏆 LEADERBOARD</div>
            <button class="clear-btn" id="clearRankBtn">CLEAR</button>
        </div>
        <div class="leaderboard-list" id="rankList">
            <div class="empty-message">no records yet</div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <span>🦖 🦕 🐀</span>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== 初始化画布 =====
    const canvas = document.getElementById('gameCanvas');
    if (!canvas) {
        console.error('Canvas not found!');
        return;
    }
    
    const ctx = canvas.getContext('2d');
    const w = 500, h = 500;

    // ===== 游戏状态 =====
    let gameStarted = false;
    let gameActive = false;
    let paused = false;
    let score = 0;

    // 玩家
    let player = {
        x: w / 2,
        y: h / 2,
        r: 38
    };

    let targetX = player.x;
    let targetY = player.y;
    let pointerInside = false;

    let animals = [];
    const ANIMAL_COUNT = 14;

    // ===== DOM 元素 =====
    const scoreSpan = document.getElementById('scoreDisplay');
    const statusText = document.getElementById('statusText');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    const modal = document.getElementById('gameoverModal');
    const finalScoreSpan = document.getElementById('finalScoreDisplay');
    const retryBtn = document.getElementById('retryBtn');
    const rankList = document.getElementById('rankList');
    const clearRankBtn = document.getElementById('clearRankBtn');

    // ===== 排行榜 =====
    function loadRanks() {
        const stored = localStorage.getItem('dinoRatRanks');
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch (e) {
                return [];
            }
        }
        return [];
    }

    function saveRanks(ranks) {
        localStorage.setItem('dinoRatRanks', JSON.stringify(ranks));
    }

    function displayRanks() {
        const ranks = loadRanks();
        if (ranks.length === 0) {
            rankList.innerHTML = '<div class="empty-message">no records yet</div>';
            return;
        }

        let html = '';
        ranks.forEach((item, index) => {
            let medal = '';
            if (index === 0) medal = '🥇';
            else if (index === 1) medal = '🥈';
            else if (index === 2) medal = '🥉';
            
            html += `
                <div class="rank-item">
                    <span class="rank-number">${medal || (index + 1)}</span>
                    <span class="rank-score">${item.score}</span>
                    <span class="rank-date">${item.date || ''}</span>
                </div>
            `;
        });
        rankList.innerHTML = html;
    }

    function addScoreToRank(newScore) {
        if (newScore === 0) return;
        
        const ranks = loadRanks();
        const now = new Date();
        const dateStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        ranks.push({
            score: newScore,
            date: dateStr
        });
        
        ranks.sort((a, b) => b.score - a.score);
        const top10 = ranks.slice(0, 10);
        saveRanks(top10);
        displayRanks();
    }

    function clearRanks() {
        if (confirm('Clear all records?')) {
            localStorage.removeItem('dinoRatRanks');
            displayRanks();
        }
    }

    // 初始化排行榜
    displayRanks();
    if (clearRankBtn) {
        clearRankBtn.addEventListener('click', clearRanks);
    }

    // ===== UI更新 =====
    function refreshScoreUI() {
        if (scoreSpan) {
            scoreSpan.textContent = score;
        }
    }

    // ===== 生成动物 =====
    function createAnimal(avoidPlayer = true) {
        let type, r;
        if (Math.random() < 0.65) {
            type = 'small';
            r = 22 + Math.floor(Math.random() * 14);
        } else {
            type = 'rat';
            r = 24 + Math.floor(Math.random() * 14);
        }

        let x, y;
        let attempts = 0;
        const maxAttempts = 800;
        let safe = false;

        while (!safe && attempts < maxAttempts) {
            x = r + Math.random() * (w - 2 * r);
            y = r + Math.random() * (h - 2 * r);
            safe = true;
            
            if (avoidPlayer && gameActive) {
                const dx = x - player.x;
                const dy = y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < player.r + r + 50) safe = false;
            }
            
            for (let a of animals) {
                const dx = x - a.x;
                const dy = y - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < r + a.r + 30) {
                    safe = false;
                    break;
                }
            }
            attempts++;
        }

        let speed = (type === 'small') ? 1.0 + Math.random() * 1.4 : 1.5 + Math.random() * 1.6;
        let angle = Math.random() * 2 * Math.PI;
        
        animals.push({
            x, y, r,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            type: type
        });
    }

    // ===== 重置游戏 =====
    function resetGame() {
        gameActive = true;
        paused = false;
        if (pauseBtn) {
            pauseBtn.textContent = 'PAUSE';
            pauseBtn.classList.remove('paused');
        }
        if (statusText) statusText.textContent = 'playing...';
        score = 0;
        player.x = w / 2;
        player.y = h / 2;
        player.r = 38;

        targetX = player.x;
        targetY = player.y;
        pointerInside = false;

        animals = [];
        for (let i = 0; i < ANIMAL_COUNT; i++) {
            createAnimal(true);
        }
        refreshScoreUI();
        if (modal) modal.classList.add('hidden');
    }

    // ===== 开始游戏 =====
    function startGame() {
        gameStarted = true;
        gameActive = true;
        paused = false;
        if (startOverlay) startOverlay.classList.add('hidden');
        if (pauseBtn) pauseBtn.disabled = false;
        if (resetBtn) resetBtn.disabled = false;
        if (statusText) statusText.textContent = 'playing...';
        
        resetGame();
    }

    // ===== 移动逻辑 =====
    function moveAI() {
        if (paused || !gameActive) return;
        
        for (let a of animals) {
            a.x += a.vx;
            a.y += a.vy;

            if (a.x - a.r < 0) { a.x = a.r; a.vx *= -0.9; }
            else if (a.x + a.r > w) { a.x = w - a.r; a.vx *= -0.9; }
            if (a.y - a.r < 0) { a.y = a.r; a.vy *= -0.9; }
            else if (a.y + a.r > h) { a.y = h - a.r; a.vy *= -0.9; }

            if (Math.random() < 0.01) {
                let angle = Math.atan2(a.vy, a.vx) + (Math.random() - 0.5) * 0.7;
                let sp = Math.hypot(a.vx, a.vy);
                a.vx = Math.cos(angle) * sp;
                a.vy = Math.sin(angle) * sp;
            }
        }
    }

    function movePlayer() {
        if (!gameActive || paused || !pointerInside) return;

        let dx = targetX - player.x;
        let dy = targetY - player.y;
        let dist = Math.hypot(dx, dy);
        if (dist < 1.5) return;

        const MOVE_SPEED = 6.5;
        let moveX = dx, moveY = dy;
        if (dist > MOVE_SPEED) {
            moveX = (dx / dist) * MOVE_SPEED;
            moveY = (dy / dist) * MOVE_SPEED;
        }

        let newX = player.x + moveX;
        let newY = player.y + moveY;
        player.x = Math.max(player.r, Math.min(w - player.r, newX));
        player.y = Math.max(player.r, Math.min(h - player.r, newY));
    }

    // ===== 碰撞检测 =====
    function handleCollisions() {
        if (!gameActive || paused) return;

        for (let i = animals.length - 1; i >= 0; i--) {
            const a = animals[i];
            const dx = player.x - a.x;
            const dy = player.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const threshold = player.r + a.r - 3;

            if (dist < threshold) {
                if (a.type === 'small' && player.r > a.r + 2) {
                    score++;
                    refreshScoreUI();
                    player.r = Math.min(76, player.r + 1.3);
                    animals.splice(i, 1);
                    createAnimal(true);
                }
                else if (a.type === 'rat') {
                    gameActive = false;
                    if (finalScoreSpan) finalScoreSpan.textContent = score;
                    if (modal) modal.classList.remove('hidden');
                    addScoreToRank(score);
                    break;
                }
            }
        }
    }

    // ===== 绘制 =====
    function draw() {
        // 清空画布
        ctx.fillStyle = '#fafafa';
        ctx.fillRect(0, 0, w, h);

        // 网格线
        ctx.strokeStyle = '#e5e5e5';
        ctx.lineWidth = 0.8;
        for (let i = 0; i <= w; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, h);
            ctx.strokeStyle = '#e0e0e0';
            ctx.stroke();
        }
        for (let i = 0; i <= h; i += 40) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(w, i);
            ctx.stroke();
        }

        // 设置字体
        ctx.font = '42px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 绘制动物
        for (let a of animals) {
            if (a.type === 'small') {
                ctx.fillStyle = '#333333';
                ctx.fillText('🦕', a.x, a.y);
            } else {
                ctx.fillStyle = '#d0312d';
                ctx.fillText('🐀', a.x, a.y);
            }
        }

        // 绘制玩家
        ctx.fillStyle = '#000000';
        ctx.fillText('🦖', player.x, player.y);

        // 暂停提示
        if (paused && gameActive) {
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillStyle = '#cccccc';
            ctx.fillText('PAUSED', w/2, 60);
        }
    }

    // ===== 游戏循环 =====
    function gameLoop() {
        if (gameStarted && gameActive && !paused) {
            movePlayer();
            moveAI();
            handleCollisions();
        }

        draw();
        requestAnimationFrame(gameLoop);
    }

    // ===== 事件监听 =====
    function handlePointerStart(e) {
        e.preventDefault();
        if (!gameStarted || !gameActive) return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = w / rect.width;
        const scaleY = h / rect.height;

        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        let rawX = (clientX - rect.left) * scaleX;
        let rawY = (clientY - rect.top) * scaleY;
        targetX = Math.max(player.r, Math.min(w - player.r, rawX));
        targetY = Math.max(player.r, Math.min(h - player.r, rawY));
        pointerInside = true;
    }

    function handlePointerMove(e) {
        e.preventDefault();
        if (!gameStarted || !gameActive || !pointerInside) return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = w / rect.width;
        const scaleY = h / rect.height;

        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        let rawX = (clientX - rect.left) * scaleX;
        let rawY = (clientY - rect.top) * scaleY;
        targetX = Math.max(player.r, Math.min(w - player.r, rawX));
        targetY = Math.max(player.r, Math.min(h - player.r, rawY));
    }

    function handlePointerEnd(e) {
        e.preventDefault();
        pointerInside = false;
    }

    // 注册画布事件
    if (canvas) {
        canvas.addEventListener('mousedown', handlePointerStart);
        canvas.addEventListener('mousemove', handlePointerMove);
        canvas.addEventListener('mouseup', handlePointerEnd);
        canvas.addEventListener('mouseleave', () => pointerInside = false);
        canvas.addEventListener('touchstart', handlePointerStart);
        canvas.addEventListener('touchmove', handlePointerMove);
        canvas.addEventListener('touchend', handlePointerEnd);
        canvas.addEventListener('touchcancel', handlePointerEnd);
    }

    // 按钮事件
    if (startBtn) {
        startBtn.addEventListener('click', startGame);
    }

    if (pauseBtn) {
        pauseBtn.addEventListener('click', () => {
            if (!gameActive) return;
            paused = !paused;
            pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
            pauseBtn.classList.toggle('paused', paused);
            if (statusText) statusText.textContent = paused ? 'paused' : 'playing...';
        });
    }

    if (resetBtn) {
        resetBtn.addEventListener('click', () => {
            if (!gameStarted) return;
            resetGame();
        });
    }

    if (retryBtn) {
        retryBtn.addEventListener('click', () => {
            if (modal) modal.classList.add('hidden');
            resetGame();
        });
    }

    // 空格键暂停
    window.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault();
            if (!gameStarted || !gameActive) return;
            paused = !paused;
            if (pauseBtn) {
                pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
                pauseBtn.classList.toggle('paused', paused);
            }
            if (statusText) statusText.textContent = paused ? 'paused' : 'playing...';
        }
    });

    // 启动游戏循环
    gameLoop();
})();
</script>
</body>
</html>
