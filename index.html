<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-REX VS RAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
        }
        .game-card {
            width: 100%;
            max-width: 500px;
            border: 1px solid #000;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
        }
        .score {
            font-size: 32px;
            font-weight: 700;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid #ccc;
            background: #fafafa;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .start-btn {
            background: #fff;
            border: 2px solid #000;
            font-size: 24px;
            font-weight: 600;
            padding: 15px 40px;
            margin-top: 20px;
            cursor: pointer;
            min-width: 200px;
        }
        .start-btn:active {
            background: #000;
            color: #fff;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .pause-btn, .reset-btn {
            background: #fff;
            border: 1px solid #000;
            font-size: 16px;
            padding: 8px 24px;
            cursor: pointer;
        }
        .pause-btn:active, .reset-btn:active {
            background: #f0f0f0;
        }
        .status {
            font-size: 16px;
            color: #666;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 24px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="game-card">
    <!-- 头部 -->
    <div class="header">
        <div class="title">🦖 VS 🐀</div>
        <div class="score" id="scoreDisplay">0</div>
    </div>

    <!-- 游戏画布 -->
    <div class="canvas-container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <!-- 开始按钮 -->
        <div id="startOverlay" class="start-overlay">
            <div style="font-size: 60px; margin-bottom: 20px;">🦖 🐀</div>
            <div style="font-size: 24px; margin-bottom: 20px;">T-REX VS RAT</div>
            <button class="start-btn" id="startBtn">START</button>
            <div style="margin-top: 20px; color: #666;">touch / mouse · space</div>
        </div>
    </div>

    <!-- 控制栏 -->
    <div class="controls">
        <button class="pause-btn" id="pauseBtn">PAUSE</button>
        <span class="status" id="statusText">▶️</span>
        <button class="reset-btn" id="resetBtn">↺</button>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <span>🦖 🦕 🐀</span>
    </div>
</div>

<script>
    (function() {
        'use strict';
        
        console.log('🚀 Game starting...');

        // 获取元素
        const canvas = document.getElementById('gameCanvas');
        if (!canvas) {
            console.error('❌ Canvas not found!');
            return;
        }
        
        const ctx = canvas.getContext('2d');
        const w = 500, h = 500;
        
        // 游戏状态
        let gameActive = false;
        let score = 0;
        let paused = false;
        
        // 玩家位置
        let player = { x: w/2, y: h/2, r: 38 };
        let mouseX = w/2, mouseY = h/2;
        let mouseInside = false;
        
        // 动物数组
        let animals = [
            { x: 100, y: 100, r: 30, type: 'small' },
            { x: 300, y: 200, r: 35, type: 'small' },
            { x: 400, y: 300, r: 40, type: 'rat' }
        ];

        // UI 元素
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusText = document.getElementById('statusText');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');

        // 绘制函数
        function draw() {
            try {
                // 清空画布
                ctx.fillStyle = '#fafafa';
                ctx.fillRect(0, 0, w, h);

                // 网格线
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= w; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, h);
                    ctx.stroke();
                }
                for (let i = 0; i <= h; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(w, i);
                    ctx.stroke();
                }

                // 设置字体
                ctx.font = '42px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // 绘制动物
                for (let a of animals) {
                    if (a.type === 'small') {
                        ctx.fillStyle = '#333';
                        ctx.fillText('🦕', a.x, a.y);
                    } else {
                        ctx.fillStyle = '#d0312d';
                        ctx.fillText('🐀', a.x, a.y);
                    }
                }

                // 绘制玩家
                ctx.fillStyle = '#000';
                ctx.fillText('🦖', player.x, player.y);

                // 暂停提示
                if (paused && gameActive) {
                    ctx.font = 'bold 24px Arial';
                    ctx.fillStyle = '#999';
                    ctx.fillText('PAUSED', w/2, 60);
                }
                
                console.log('✅ Draw completed');
            } catch (e) {
                console.error('❌ Draw error:', e);
            }
        }

        // 移动玩家
        function movePlayer() {
            if (!gameActive || paused || !mouseInside) return;
            
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist < 2) return;
            
            const speed = 5;
            const moveX = (dx / dist) * Math.min(dist, speed);
            const moveY = (dy / dist) * Math.min(dist, speed);
            
            player.x = Math.max(player.r, Math.min(w - player.r, player.x + moveX));
            player.y = Math.max(player.r, Math.min(h - player.r, player.y + moveY));
        }

        // 碰撞检测
        function checkCollisions() {
            if (!gameActive || paused) return;
            
            for (let i = animals.length - 1; i >= 0; i--) {
                const a = animals[i];
                const dx = player.x - a.x;
                const dy = player.y - a.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < player.r + a.r - 5) {
                    if (a.type === 'small') {
                        score++;
                        scoreSpan.textContent = score;
                        animals.splice(i, 1);
                        animals.push({ 
                            x: Math.random() * (w-60) + 30, 
                            y: Math.random() * (h-60) + 30, 
                            r: 25 + Math.random() * 15, 
                            type: 'small' 
                        });
                    } else {
                        gameActive = false;
                        alert('GAME OVER! Score: ' + score);
                    }
                }
            }
        }

        // 游戏循环
        function gameLoop() {
            if (gameActive && !paused) {
                movePlayer();
                checkCollisions();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 鼠标/触摸事件
        function handleMove(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = w / rect.width;
            const scaleY = h / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            mouseX = Math.max(player.r, Math.min(w - player.r, (clientX - rect.left) * scaleX));
            mouseY = Math.max(player.r, Math.min(h - player.r, (clientY - rect.top) * scaleY));
            mouseInside = true;
        }

        // 注册事件
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('mouseenter', () => mouseInside = true);
        canvas.addEventListener('mouseleave', () => mouseInside = false);
        canvas.addEventListener('touchend', () => mouseInside = false);

        // 开始按钮
        startBtn.addEventListener('click', () => {
            console.log('🎮 Game started');
            startOverlay.classList.add('hidden');
            gameActive = true;
            score = 0;
            scoreSpan.textContent = '0';
            player.x = w/2;
            player.y = h/2;
            
            // 初始化动物
            animals = [];
            for (let i = 0; i < 10; i++) {
                animals.push({ 
                    x: Math.random() * (w-60) + 30, 
                    y: Math.random() * (h-60) + 30, 
                    r: 25 + Math.random() * 15, 
                    type: Math.random() < 0.7 ? 'small' : 'rat' 
                });
            }
        });

        // 暂停按钮
        pauseBtn.addEventListener('click', () => {
            if (!gameActive) return;
            paused = !paused;
            pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
            statusText.textContent = paused ? '⏸️' : '▶️';
        });

        // 重置按钮
        resetBtn.addEventListener('click', () => {
            gameActive = true;
            paused = false;
            score = 0;
            scoreSpan.textContent = '0';
            pauseBtn.textContent = 'PAUSE';
            statusText.textContent = '▶️';
            player.x = w/2;
            player.y = w/2;
            
            animals = [];
            for (let i = 0; i < 10; i++) {
                animals.push({ 
                    x: Math.random() * (w-60) + 30, 
                    y: Math.random() * (h-60) + 30, 
                    r: 25 + Math.random() * 15, 
                    type: Math.random() < 0.7 ? 'small' : 'rat' 
                });
            }
        });

        // 空格键
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                if (!gameActive) return;
                paused = !paused;
                pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
                statusText.textContent = paused ? '⏸️' : '▶️';
            }
        });

        // 启动游戏循环
        gameLoop();
        console.log('✅ Game loop started');
    })();
</script>
</body>
</html>
