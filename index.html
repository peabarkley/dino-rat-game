<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-REX VS RAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 10px;
        }
        .game-card {
            width: 100%;
            max-width: 500px;
            border: 1px solid #000;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
        }
        .score {
            font-size: 32px;
            font-weight: bold;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid #ccc;
            background: #f5f5f5;
            margin-bottom: 20px;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .start-btn {
            background: white;
            border: 2px solid black;
            font-size: 24px;
            padding: 15px 40px;
            margin-top: 20px;
            cursor: pointer;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="game-card">
        <div class="header">
            <div class="title">🦖 VS 🐀</div>
            <div class="score" id="scoreDisplay">0</div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            
            <div id="startOverlay" class="start-overlay">
                <div style="font-size: 60px; margin-bottom: 20px;">🦖 🐀</div>
                <div style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">T-REX VS RAT</div>
                <button class="start-btn" id="startBtn">START</button>
                <div style="margin-top: 20px; color: #666;">touch to move</div>
            </div>
        </div>

        <div class="footer">
            <span>🦖 🦕 🐀</span>
        </div>
    </div>

    <script>
        (function() {
            console.log('Script started');
            
            const canvas = document.getElementById('gameCanvas');
            console.log('Canvas:', canvas);
            
            if (!canvas) {
                console.error('Canvas not found!');
                return;
            }
            
            const ctx = canvas.getContext('2d');
            const w = 500, h = 500;
            
            // 简单的绘制测试
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, w, h);
            ctx.font = '50px Arial';
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.fillText('🦖', w/2, h/2);
            
            console.log('Drawing test completed');
            
            // 开始按钮
            const startBtn = document.getElementById('startBtn');
            const startOverlay = document.getElementById('startOverlay');
            
            if (startBtn) {
                startBtn.addEventListener('click', function() {
                    console.log('Start button clicked');
                    startOverlay.classList.add('hidden');
                    
                    // 重新绘制
                    ctx.clearRect(0, 0, w, h);
                    ctx.fillStyle = '#f0f0f0';
                    ctx.fillRect(0, 0, w, h);
                    ctx.font = '50px Arial';
                    ctx.fillStyle = '#000';
                    ctx.fillText('🦖', w/2, h/2);
                    ctx.fillText('🦕', w/3, h/1.5);
                    ctx.fillStyle = 'red';
                    ctx.fillText('🐀', w*2/3, h/1.5);
                });
            }
            
            console.log('Event listeners added');
        })();
    </script>
</body>
</html>
